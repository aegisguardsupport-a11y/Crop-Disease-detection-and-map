name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: {}

# Cancel older in-progress runs of the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  # Skip TF GPU init noise in CI logs.
  TF_CPP_MIN_LOG_LEVEL: "2"
  CUDA_VISIBLE_DEVICES: ""

jobs:
  # =========================================================================
  # Single job: lint + typecheck + fast tests.
  # ~3-5 minutes once dependencies are cached.
  # =========================================================================
  lint-typecheck-test:
    name: Lint, typecheck, fast tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff format)
        run: ruff format --check src tests
        continue-on-error: true   # informational only — not a hard failure

      - name: Type check (mypy)
        run: mypy src

      - name: Run fast tests
        run: pytest -m "not slow" -q --maxfail=1
